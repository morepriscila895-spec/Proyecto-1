<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postular</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!--Google fonnts-->
    <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=Caveat+Brush&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: "Caveat Brush";
            color: #333;
            margin: 0;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; min-height;">

        <header style="margin-bottom: 20px; border-bottom: 1px solid white; padding-bottom: 10px;">
            <a href="index.html" style="text-decoration: none; color: blue; font-weight: bold;">
                <i class="bi bi-arrow-left"></i> Volver a ofertas
            </a>
            <h1>📝 Ficha de Postulación</h1>
            <p style="color: gray;">Puesto: <strong>Frontend Developer Trainee</strong></p>
        </header>

        <main>
            <form action="index.html">

                <!--Fieldset para marco de linea en cuadro-->
                <fieldset style="border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                    <legend style="color: blue; font-weight: bold;">Datos Personales</legend>

                    <label>Nombre Completo:</label><br>
                    <!-- label = Es la descripcion fuera del cuadro puede ser encima con letra mas delgada-->
                    <input type="text" placeholder="Tu nombre aquí" required
                        style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">
                    <!--input Campo donde el usurio pude escribir info/ puede ser tex o date(calendario) o etc-->
                    <label>Correo Electrónico:</label><br>
                    <input type="email" placeholder="Danila123@gmail.com" required
                        style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

                    <label>Teléfono:</label><br>
                    <input type="tel" placeholder="+51 123 456 789 "
                        style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">
                </fieldset>

                <fieldset style="border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                    <legend style="color: blue; font-weight: bold;">Perfil Técnico</legend>

                    <label>Link de GitHub:</label><br>
                    <input type="url" placeholder="https://github.com/usuario"
                        style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

                    <label>Nivel de Inglés:</label><br>
                    <select style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">
                        <option>Basic</option>
                        <option>Intermediate</option>
                        <option>Advanced</option>
                    </select>
                    <!-- label = Es la descripcion fuera del cuadro puede ser encima con letra mas delgada-->
                    <label>Tecnologías (Marca las que sepas):</label><br><br>
                    <input type="checkbox" name="tech" value="html"> HTML5 &nbsp;&nbsp;
                    <input type="checkbox" name="tech" value="css"> CSS3 &nbsp;&nbsp;
                    <input type="checkbox" name="tech" value="js"> JavaScript
                    <!--Input para agregar cubos de selccion-->
                </fieldset>

                <fieldset style="border: 1px solid gray; padding: 30px; margin-bottom: 40px; border-radius: 8px;">
                    <legend style="color: blue; font-weight: bold;">Documentación</legend>

                    <label>Sube tu CV (PDF):</label><br>
                    <input type="file" accept=".pdf" required style="margin-top: 10px; margin-bottom: 15px;">
                    <!--File es para aceptar archivos-->
                    <br><br>

                    <label>Mensaje de er4eclutador:</label><br>
                    <textarea rows="4" style="width: 100%; padding: 10px; box-sizing: border-box;"></textarea>
                </fieldset>

                <button type="submit"
                    style="width: 100%; background-color: #007bff; color: white; padding: 15px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    🚀 Enviar Postulación
                </button>

            </form>
        </main>

    </div>

</body>

</html>
<!--Profe me rindo-->
